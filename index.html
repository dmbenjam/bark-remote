<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FetchFlix Bark Remote MVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --bg-red: #170808;
      --bg-green: #07170f;
      --card: #151515;
      --card-edge: #262626;
      --text: #ffffff;
      --muted: #b7b7b7;
      --accent: #cc0000;
      --accent-soft: #8f1515;
      --playing: #0f8f45;
      --paused: #7e7e7e;
      --shadow: 0 20px 48px rgba(0, 0, 0, 0.45);
      --stack-gap: clamp(0.8rem, 2.2vh, 1.15rem);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      background: #000;
      color: var(--text);
      font-family: "Inter", system-ui, -apple-system, Segoe UI, sans-serif;
      display: grid;
      place-items: center;
      padding: clamp(0.8rem, 1.6vw, 1.2rem);
      transition: background-color 280ms ease;
      overflow: hidden;
    }

    .app-screen.paused-theme {
      background:
        radial-gradient(circle at 18% 12%, rgba(204, 0, 0, 0.28), transparent 44%),
        radial-gradient(circle at 85% 90%, rgba(128, 20, 20, 0.18), transparent 50%),
        var(--bg-red);
    }

    .app-screen.playing-theme {
      background:
        radial-gradient(circle at 16% 14%, rgba(18, 151, 81, 0.27), transparent 44%),
        radial-gradient(circle at 84% 88%, rgba(15, 95, 56, 0.16), transparent 50%),
        var(--bg-green);
    }

    .phone-shell {
      width: min(100vw - 2rem, calc((100svh - 2rem) * (629.19 / 1227.48)));
      height: min(100svh - 2rem, calc((100vw - 2rem) * (1227.48 / 629.19)));
      max-height: 96svh;
      aspect-ratio: 629.19 / 1227.48;
      position: relative;
      background: center / contain no-repeat url("mobile_outline.svg");
      filter: drop-shadow(0 28px 50px rgba(0, 0, 0, 0.55));
    }

    .app-screen {
      position: absolute;
      left: 4.47%;
      right: 4.47%;
      top: 2.29%;
      bottom: 2.29%;
      border-radius: 38px;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 8%, rgba(175, 0, 0, 0.2), transparent 40%),
        radial-gradient(circle at 86% 90%, rgba(80, 0, 0, 0.22), transparent 48%),
        linear-gradient(180deg, #131313 0%, #090909 100%);
      display: grid;
      padding: clamp(0.9rem, 2.6vw, 1.35rem);
    }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: var(--stack-gap);
      overflow: hidden;
      text-align: center;
    }

    .logo {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 0.05em;
      font-size: clamp(2.4rem, 6.8vw, 3.4rem);
      line-height: 1;
      display: flex;
      align-items: center;
      text-shadow: 0 0 24px rgba(204, 0, 0, 0.2);
    }

    .remote-card {
      width: min(100%, 320px);
      background: transparent;
      border: none;
      border-radius: 0;
      box-shadow: none;
      padding: 0;
      display: grid;
      gap: var(--stack-gap);
      justify-items: center;
    }

    .status-badge {
      font-weight: 600;
      font-size: 0.88rem;
      border-radius: 999px;
      padding: 0.36rem 0.8rem;
      border: 1px solid transparent;
      transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease;
    }

    .status-playing {
      background: rgba(15, 143, 69, 0.2);
      border-color: rgba(15, 143, 69, 0.5);
      color: #8de0b2;
    }

    .status-paused {
      background: rgba(126, 126, 126, 0.2);
      border-color: rgba(150, 150, 150, 0.45);
      color: #dddddd;
    }

    .power-button {
      width: clamp(124px, 34vw, 164px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background:
        radial-gradient(circle at 30% 30%, #2a2a2a, #171717 52%, #121212 100%);
      box-shadow:
        inset 0 2px 12px rgba(255, 255, 255, 0.04),
        inset 0 -8px 16px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(204, 0, 0, 0.3),
        0 10px 26px rgba(0, 0, 0, 0.5);
      display: grid;
      place-items: center;
      transition: transform 130ms ease, box-shadow 220ms ease;
      -webkit-tap-highlight-color: transparent;
    }

    .power-button:hover {
      box-shadow:
        inset 0 2px 12px rgba(255, 255, 255, 0.06),
        inset 0 -8px 16px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(204, 0, 0, 0.5),
        0 16px 30px rgba(0, 0, 0, 0.58);
    }

    .power-button.is-playing {
      box-shadow:
        inset 0 2px 12px rgba(255, 255, 255, 0.04),
        inset 0 -8px 16px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(15, 143, 69, 0.56),
        0 10px 26px rgba(0, 0, 0, 0.5);
    }

    .power-button.is-playing:hover {
      box-shadow:
        inset 0 2px 12px rgba(255, 255, 255, 0.06),
        inset 0 -8px 16px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(56, 214, 125, 0.72),
        0 16px 30px rgba(0, 0, 0, 0.58);
    }

    .power-button:active {
      transform: scale(0.97);
    }

    .icon-wrapper {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-bottom: 14px solid transparent;
      border-left: 24px solid #f4f4f4;
      position: absolute;
      inset: 10px 0 0 13px;
      opacity: 0;
      transform: translateX(-4px) scale(0.88);
      transition: opacity 180ms ease, transform 220ms ease;
    }

    .pause-icon {
      position: absolute;
      inset: 8px 0 0 7px;
      display: flex;
      gap: 11px;
      opacity: 0;
      transform: scale(0.88);
      transition: opacity 180ms ease, transform 220ms ease;
    }

    .pause-icon span {
      width: 12px;
      height: 30px;
      border-radius: 4px;
      background: #f4f4f4;
    }

    .is-paused .play-icon {
      opacity: 1;
      transform: translateX(0) scale(1);
    }

    .is-playing .pause-icon {
      opacity: 1;
      transform: scale(1);
    }

    .listening-row {
      width: auto;
      display: grid;
      justify-items: center;
    }

    .equalizer {
      width: 120px;
      height: 30px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
    }

    .equalizer span {
      width: 6px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff5e5e 0%, #cc0000 100%);
      height: 8px;
      opacity: 0.45;
      transform-origin: bottom center;
      transition: height 90ms linear, opacity 90ms linear;
    }

    .equalizer.listening span {
      opacity: 0.85;
    }

    .slider-group {
      width: 100%;
      display: grid;
      gap: 0.4rem;
    }

    .slider-control-row {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      width: 100%;
    }

    .mute-button {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 1px solid rgba(204, 0, 0, 0.45);
      background: rgba(23, 23, 23, 0.85);
      color: #f4f4f4;
      display: grid;
      place-items: center;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      transition: background-color 160ms ease, border-color 160ms ease, transform 130ms ease;
    }

    .mute-button:hover {
      border-color: rgba(204, 0, 0, 0.72);
      background: rgba(38, 38, 38, 0.95);
    }

    .mute-button:active {
      transform: scale(0.95);
    }

    .mute-button.is-muted {
      border-color: rgba(126, 126, 126, 0.65);
      background: rgba(80, 80, 80, 0.3);
      color: #dddddd;
    }

    .slider-group label {
      font-size: 0.83rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .slider-control-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .footnote,
    .legal {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      line-height: 1.4;
      max-width: 95%;
    }

    .legal {
      font-size: 0.72rem;
      color: #9a9a9a;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 760px) {
      body {
        padding: 0;
        overflow: hidden;
      }

      .phone-shell {
        width: 100vw;
        height: 100svh;
        max-height: none;
        background: none;
        filter: none;
      }

      .app-screen {
        position: static;
        inset: auto;
        border-radius: 0;
        padding: max(0.9rem, env(safe-area-inset-top)) 1rem max(0.9rem, env(safe-area-inset-bottom));
      }
    }

  </style>
</head>
<body>
  <div class="phone-shell">
    <main class="app-screen" id="appScreen">
      <section class="app">
        <h1 class="logo">FETCHFLIX</h1>
        <p class="footnote">
          FetchFlix listens for your dog's bark using your device microphone. Bark to pause. Bark again to play.
        </p>

        <section class="remote-card" id="remoteCard" aria-live="polite">
          <div class="status-badge status-paused" id="statusBadge">⏸ Paused</div>

          <button class="power-button is-paused" id="toggleBtn" type="button" aria-label="Toggle play/pause">
            <span class="icon-wrapper">
              <span class="play-icon" aria-hidden="true"></span>
              <span class="pause-icon" aria-hidden="true"><span></span><span></span></span>
            </span>
          </button>

          <div class="listening-row">
            <div class="equalizer" id="equalizer" aria-hidden="true">
              <span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
          </div>

          <div class="slider-group">
            <label for="sensitivity">Bark Sensitivity <span id="sensitivityValue">50%</span></label>
            <div class="slider-control-row">
              <button class="mute-button" id="muteBtn" type="button" aria-label="Mute bark detection" aria-pressed="false">🔊</button>
              <input id="sensitivity" type="range" min="0" max="100" value="50">
            </div>
          </div>
        </section>

      </section>
    </main>
  </div>

  <script>
    const ui = {
      remoteCard: document.getElementById("remoteCard"),
      statusBadge: document.getElementById("statusBadge"),
      toggleBtn: document.getElementById("toggleBtn"),
      muteBtn: document.getElementById("muteBtn"),
      equalizer: document.getElementById("equalizer"),
      sensitivity: document.getElementById("sensitivity"),
      sensitivityValue: document.getElementById("sensitivityValue"),
      appScreen: document.getElementById("appScreen")
    };

    let isPlaying = false;
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let detectionRaf = null;
    let lastDetection = 0;
    let isMuted = false;
    let lastActiveSensitivity = Number(ui.sensitivity.value);
    let threshold = sliderToThreshold(Number(ui.sensitivity.value));
    const detectionCooldownMs = 800;
    const equalizerBars = Array.from(ui.equalizer.querySelectorAll("span"));

    function sliderToThreshold(sliderValue) {
      if (sliderValue <= 0) {
        // A value of 0 should fully disable bark-trigger detection.
        return Number.POSITIVE_INFINITY;
      }
      // Lower slider value means more sensitivity (lower threshold needed).
      const minThreshold = 0.035;
      const maxThreshold = 0.23;
      const clampedValue = Math.max(1, Math.min(100, sliderValue));
      const normalized = (clampedValue - 1) / 99;
      return minThreshold + normalized * (maxThreshold - minThreshold);
    }

    function setSensitivityValue(value) {
      ui.sensitivity.value = String(value);
      threshold = sliderToThreshold(value);
      ui.sensitivityValue.textContent = `${value}%`;
    }

    function updateEqualizerFromDetectionLevel(rms) {
      let activation = 0;
      if (Number.isFinite(threshold) && threshold > 0) {
        // Scale motion by proximity to trigger threshold.
        activation = Math.max(0, Math.min(rms / threshold, 1));
      }
      equalizerBars.forEach((bar, index) => {
        const variance = 0.62 + ((index + 1) / equalizerBars.length) * 0.48;
        const wave = 0.84 + Math.sin(performance.now() * 0.008 + index) * 0.2;
        const normalizedHeight = Math.max(0.08, Math.min(activation * variance * wave, 1));
        const px = 6 + normalizedHeight * 24;
        bar.style.height = `${px.toFixed(1)}px`;
        bar.style.opacity = `${(0.22 + normalizedHeight * 0.74).toFixed(2)}`;
      });
    }

    function setPlayingState(nextState) {
      isPlaying = nextState;
      ui.statusBadge.textContent = isPlaying ? "▶ Playing" : "⏸ Paused";
      ui.statusBadge.classList.toggle("status-playing", isPlaying);
      ui.statusBadge.classList.toggle("status-paused", !isPlaying);
      ui.toggleBtn.classList.toggle("is-playing", isPlaying);
      ui.toggleBtn.classList.toggle("is-paused", !isPlaying);
      ui.appScreen.classList.toggle("playing-theme", isPlaying);
      ui.appScreen.classList.toggle("paused-theme", !isPlaying);
    }

    function togglePlayback() {
      setPlayingState(!isPlaying);
    }

    function setMutedState(nextState) {
      isMuted = nextState;
      ui.muteBtn.classList.toggle("is-muted", isMuted);
      ui.muteBtn.setAttribute("aria-pressed", String(isMuted));
      ui.muteBtn.setAttribute("aria-label", isMuted ? "Unmute bark detection" : "Mute bark detection");
      ui.muteBtn.textContent = isMuted ? "🔇" : "🔊";
      if (isMuted) {
        const current = Number(ui.sensitivity.value);
        if (current > 0) {
          lastActiveSensitivity = current;
        }
        setSensitivityValue(0);
      } else {
        const restoreValue = Math.max(1, Math.min(100, lastActiveSensitivity || 50));
        setSensitivityValue(restoreValue);
      }
    }

    function computeRMS(byteArray) {
      let sumSquares = 0;
      for (let i = 0; i < byteArray.length; i += 1) {
        const sample = (byteArray[i] - 128) / 128;
        sumSquares += sample * sample;
      }
      return Math.sqrt(sumSquares / byteArray.length);
    }

    function beginDetectionLoop() {
      if (!analyser || !dataArray) return;
      ui.equalizer.classList.add("listening");

      const loop = () => {
        analyser.getByteTimeDomainData(dataArray);
        const rms = computeRMS(dataArray);
        updateEqualizerFromDetectionLevel(rms);
        const now = performance.now();
        if (!isMuted && rms > threshold && now - lastDetection >= detectionCooldownMs) {
          lastDetection = now;
          togglePlayback();
        }
        detectionRaf = requestAnimationFrame(loop);
      };
      detectionRaf = requestAnimationFrame(loop);
    }

    function stopDetectionLoop() {
      if (detectionRaf) {
        cancelAnimationFrame(detectionRaf);
        detectionRaf = null;
      }
      equalizerBars.forEach((bar) => {
        bar.style.height = "8px";
        bar.style.opacity = "0.45";
      });
      ui.equalizer.classList.remove("listening");
    }

    async function enableBarkDetection() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024;
        analyser.smoothingTimeConstant = 0.2;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        beginDetectionLoop();
      } catch (error) {
        console.warn("Microphone access failed:", error);
      }
    }

    ui.toggleBtn.addEventListener("click", () => togglePlayback());
    ui.muteBtn.addEventListener("click", () => {
      setMutedState(!isMuted);
    });
    ui.sensitivity.addEventListener("input", (event) => {
      const value = Number(event.target.value);
      if (value > 0) {
        lastActiveSensitivity = value;
      }
      threshold = sliderToThreshold(value);
      ui.sensitivityValue.textContent = `${value}%`;
    });

    window.addEventListener("beforeunload", () => {
      stopDetectionLoop();
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
    });

    setPlayingState(false);
    setMutedState(false);
    enableBarkDetection();
  </script>
</body>
</html>
